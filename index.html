<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Nuestra Boda</title>

<style>

body{
    margin:0;
    font-family:Georgia, serif;
    background:#f5f1e8;
    color:#222;
}

.hero{
    text-align:center;
    padding:60px 20px;
}

h1{
    font-size:3rem;
}

.subtitle{
    font-size:1.2rem;
}

.section{
    max-width:800px;
    margin:auto;
    padding:40px 20px;
}

.card{
    background:white;
    padding:30px;
    border-radius:10px;
    margin-bottom:20px;
    box-shadow:0 2px 10px rgba(0,0,0,.1);
}

.button{
    display:inline-block;
    padding:15px 30px;
    background:black;
    color:white;
    text-decoration:none;
    border-radius:5px;
}

.button:hover{
    opacity:.8;
}

footer{
    text-align:center;
    padding:40px;
}

</style>

</head>

<body>

<div class="hero">

<h1>Fernando & Alejandra</h1>

<p class="subtitle">
14 de Febrero de 2027
</p>

</div>

<div class="section">

<div class="card">

<h2>💌 Libro de Firmas</h2>

<p>
Déjanos un mensaje para recordar este día.
</p>

<a class="button"
href="AQUI_VA_TU_FORMULARIO"
target="_blank">

Firmar

</a>

</div>

<div class="card">

<h2>📸 Comparte tus Fotos</h2>

<p>
Sube tus fotografías favoritas de la boda.
</p>

<a class="button"
href="AQUI_VA_TU_ALBUM"
target="_blank">

Subir Fotos

</a>

</div>

<div class="card">

<h2>❤️ Gracias por acompañarnos</h2>

<p>
Su presencia hace este día aún más especial.
</p>

</div>

</div>

<footer>

Fernando & Alejandra

</footer>

</body>
</html>
